services:
  tolle-admin:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.tolle.qalitylabs.fr}
    container_name: tolle-admin
    restart: unless-stopped
    expose:
      - "80"
    environment:
      VIRTUAL_HOST: admin-tolle.qalitylabs.fr
      VIRTUAL_PORT: "80"
      VIRTUAL_NETWORK: ${NGINX_PROXY_NETWORK:-apps_web}
      LETSENCRYPT_HOST: admin-tolle.qalitylabs.fr
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    networks:
      - nginx-proxy

networks:
  nginx-proxy:
    external: true
    name: ${NGINX_PROXY_NETWORK:-apps_web}
