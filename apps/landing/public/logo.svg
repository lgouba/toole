<!--
  Tôllé · logo horizontal (landscape)
  Format : 1600 × 480 (ratio ~10:3)
  Couleurs : fond navy #1a1a2e · texte gradient vert kola · accents BLANCS
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 480" width="1600" height="480">
  <defs>
    <linearGradient id="greenGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- Plaque navy -->
  <rect x="0" y="0" width="1600" height="480" rx="56" fill="#1a1a2e"/>

  <g transform="translate(800, 240)">
    <!-- TOLLE sans accents, en gradient vert -->
    <text x="0" y="100" text-anchor="middle"
          font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
          font-size="320" font-weight="900" font-style="italic"
          fill="url(#greenGradient)" letter-spacing="-8">TOLLE</text>

    <!-- Accent CIRCONFLEXE blanc au-dessus du O (2ème lettre) -->
    <path d="M -200 -130 L -140 -200 L -80 -130"
          stroke="white" stroke-width="22" stroke-linecap="round"
          stroke-linejoin="round" fill="none"/>

    <!-- Accent AIGU blanc au-dessus du E (dernier char) - inclinaison / : bas-gauche vers haut-droite -->
    <path d="M 455 -130 L 510 -200"
          stroke="white" stroke-width="22" stroke-linecap="round" fill="none"/>
  </g>
</svg>
