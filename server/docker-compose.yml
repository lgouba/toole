services:
  tolle-db:
    image: postgres:16-alpine
    container_name: tolle-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tolle
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: tolle
    volumes:
      - tolle-db-data:/var/lib/postgresql/data
    networks:
      - tolle-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tolle -d tolle"]
      interval: 5s
      timeout: 5s
      retries: 10

  tolle-api:
    build: .
    container_name: tolle-api
    restart: unless-stopped
    depends_on:
      tolle-db:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://tolle:${DB_PASSWORD}@tolle-db:5432/tolle
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      # OTP / SMS
      SMS_PROVIDER: ${SMS_PROVIDER:-dev}
      OTP_DEV_CODE: ${OTP_DEV_CODE:-1234}
      AT_USERNAME: ${AT_USERNAME:-}
      AT_API_KEY: ${AT_API_KEY:-}
      AT_SENDER_ID: ${AT_SENDER_ID:-}
      # SMTP (Hostinger, Gmail, etc.)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ADMIN_ALERT_EMAIL: ${ADMIN_ALERT_EMAIL:-}

      # nginx-proxy + acme-companion (auto HTTPS)
      VIRTUAL_HOST: api.tolle.qalitylabs.fr
      VIRTUAL_PORT: "3000"
      VIRTUAL_NETWORK: ${NGINX_PROXY_NETWORK:-nginx-proxy}
      # Nginx-proxy lit cette env var pour configurer client_max_body_size
      # sur le vhost genere. Necessaire pour accepter les uploads photo.
      CLIENT_MAX_BODY_SIZE: 10m
      LETSENCRYPT_HOST: api.tolle.qalitylabs.fr
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
      UPLOAD_DIR: /app/uploads
    volumes:
      - tolle-uploads:/app/uploads
    networks:
      nginx-proxy:
      tolle-internal:

volumes:
  tolle-db-data:
  tolle-uploads:

networks:
  nginx-proxy:
    external: true
    name: ${NGINX_PROXY_NETWORK:-apps_web}
  tolle-internal:
    driver: bridge
