services:
  tolle-api:
    build: .
    container_name: tolle-api
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      # App config
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      OTP_DEV_CODE: ${OTP_DEV_CODE:-1234}

      # nginx-proxy + acme-companion (auto HTTPS)
      VIRTUAL_HOST: api.tolle.qalitylabs.fr
      VIRTUAL_PORT: "3000"
      LETSENCRYPT_HOST: api.tolle.qalitylabs.fr
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    networks:
      - nginx-proxy

networks:
  nginx-proxy:
    external: true
    name: ${NGINX_PROXY_NETWORK:-nginx-proxy}
