<!--
  Tôllé · icon square ALTERNATIVE (TÔLLÉ entier)
  Format : 1024 × 1024
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="greenGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="180" fill="#1a1a2e"/>

  <g transform="translate(512, 540)">
    <text x="0" y="80" text-anchor="middle"
          font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
          font-size="260" font-weight="900" font-style="italic"
          fill="url(#greenGradient)" letter-spacing="-12">TOLLE</text>

    <!-- Accent circonflexe blanc au-dessus du O -->
    <path d="M -180 -200 L -130 -260 L -80 -200"
          stroke="white" stroke-width="22" stroke-linecap="round"
          stroke-linejoin="round" fill="none"/>

    <!-- Accent aigu blanc au-dessus du E - direction / -->
    <path d="M 330 -200 L 380 -260"
          stroke="white" stroke-width="22" stroke-linecap="round" fill="none"/>
  </g>
</svg>
