<!--
  Tôllé · app icon carré 1024×1024
  Wordmark TÔLLÉ complet centré + accents blancs calibrés.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="220" fill="#1a1a2e"/>

  <!-- TOLLE wordmark. text-anchor=start avec x calculé pour centrage manuel.
       Le centre visuel doit être à 512 ; avec font-size 260 italic 900,
       la largeur du mot fait ~830px → on commence à x=90 -->
  <text x="98" y="640"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Helvetica Neue Bold', sans-serif"
        font-size="260" font-weight="900" font-style="italic"
        fill="url(#g)" letter-spacing="-8">TOLLE</text>

  <!-- Accent CIRCONFLEXE blanc au-dessus du O (2e lettre).
       Calibré sur le rendu Helvetica italique 900 :
       le O occupe environ x=270 à x=450, top à y~410 -->
  <path d="M 290 410 L 370 320 L 450 410"
        stroke="white" stroke-width="40" stroke-linecap="round"
        stroke-linejoin="round" fill="none"/>

  <!-- Accent AIGU blanc au-dessus du E (dernier char).
       Le E occupe x=760 à x=920 en italique, top à y~410 -->
  <path d="M 810 410 L 905 320"
        stroke="white" stroke-width="40" stroke-linecap="round" fill="none"/>
</svg>
