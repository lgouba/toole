<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgI" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#ECFDF5"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="230" fill="url(#bgI)"/>
  <g transform="translate(152,212) scale(1.2)">
    <svg viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <linearGradient id="bagG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22C55E"/>
      <stop offset="1" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="bodyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="scootG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4ADE80"/>
      <stop offset="1" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="speedG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#86EFAC" stop-opacity="0"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="320" cy="450" rx="200" ry="14" fill="#15803D" opacity="0.18"/>

  <!-- Speed trails behind -->
  <rect x="20"  y="270" width="160" height="14" rx="7" fill="url(#speedG)" opacity="0.55"/>
  <rect x="0"   y="305" width="200" height="14" rx="7" fill="url(#speedG)" opacity="0.75"/>
  <rect x="40"  y="345" width="140" height="14" rx="7" fill="url(#speedG)" opacity="0.95"/>

  <!-- Rear wheel -->
  <circle cx="170" cy="420" r="48" fill="#0F2E1F"/>
  <circle cx="170" cy="420" r="30" fill="#1F4A36"/>
  <circle cx="170" cy="420" r="10" fill="#86EFAC"/>

  <!-- Front wheel -->
  <circle cx="490" cy="420" r="48" fill="#0F2E1F"/>
  <circle cx="490" cy="420" r="30" fill="#1F4A36"/>
  <circle cx="490" cy="420" r="10" fill="#86EFAC"/>

  <!-- Scooter body (rear platform + seat curve) -->
  <path d="M 150 420
           Q 150 360 200 350
           L 320 350
           Q 360 350 380 320
           L 430 280
           Q 460 270 480 290
           L 500 330
           Q 510 360 490 380
           L 470 420
           Z"
        fill="url(#scootG)"/>

  <!-- Scooter front panel / leg shield -->
  <path d="M 420 280 Q 470 240 510 260 L 530 330 Q 530 360 510 380 L 480 380 Z"
        fill="#22C55E"/>

  <!-- Headlight -->
  <ellipse cx="525" cy="305" rx="18" ry="12" fill="#FEF3C7"/>
  <ellipse cx="525" cy="305" rx="10" ry="7" fill="#FCD34D"/>

  <!-- Handlebar stem -->
  <rect x="440" y="190" width="14" height="70" rx="6" fill="#15803D"/>
  <!-- Handlebar grip -->
  <rect x="395" y="180" width="80" height="18" rx="9" fill="#0F2E1F"/>
  <!-- Mirror -->
  <circle cx="408" cy="160" r="10" fill="#0F2E1F"/>
  <rect x="403" y="170" width="6" height="14" fill="#0F2E1F"/>

  <!-- Delivery bag (back) -->
  <rect x="115" y="130" width="160" height="200" rx="18" fill="url(#bagG)"/>
  <!-- bag straps -->
  <rect x="125" y="130" width="140" height="14" rx="7" fill="#0F2E1F" opacity="0.45"/>
  <!-- bag T mark -->
  <g transform="translate(165,180)">
    <rect x="0" y="0" width="70" height="16" rx="6" fill="#FFFFFF"/>
    <rect x="27" y="0" width="16" height="80" rx="6" fill="#FFFFFF"/>
  </g>
  <!-- bag highlight -->
  <rect x="125" y="145" width="20" height="170" rx="6" fill="#FFFFFF" opacity="0.15"/>

  <!-- Rider body (torso) -->
  <path d="M 240 210
           Q 260 180 300 180
           L 360 200
           Q 380 215 380 240
           L 370 310
           Q 360 330 330 330
           L 270 330
           Q 240 320 235 290
           Z"
        fill="url(#bodyG)"/>

  <!-- Rider arm to handlebar -->
  <path d="M 360 230 Q 400 220 430 200 L 440 215 Q 410 240 370 255 Z" fill="#22C55E"/>

  <!-- Rider leg -->
  <path d="M 290 320 Q 290 370 330 380 L 380 360 Q 360 340 350 320 Z" fill="#15803D"/>

  <!-- Helmet -->
  <path d="M 270 90
           Q 270 50 320 50
           Q 380 50 390 100
           L 395 160
           Q 395 180 380 185
           L 290 185
           Q 270 180 270 160
           Z"
        fill="#15803D"/>
  <!-- Helmet top highlight -->
  <path d="M 280 80 Q 290 60 330 58 Q 360 58 372 75 Q 360 70 330 72 Q 300 75 285 90 Z" fill="#22C55E"/>
  <!-- Visor -->
  <path d="M 305 105
           Q 305 95 320 92
           L 380 100
           Q 390 105 388 125
           L 385 145
           Q 380 155 365 155
           L 320 152
           Q 305 148 305 138
           Z"
        fill="#86EFAC"/>
  <!-- visor reflection -->
  <path d="M 315 110 Q 320 100 340 102 L 375 108 Q 370 115 355 113 L 325 110 Z" fill="#FFFFFF" opacity="0.55"/>
  <!-- chin guard -->
  <path d="M 290 160 Q 320 175 380 168 L 388 178 Q 350 192 290 180 Z" fill="#0F2E1F" opacity="0.3"/>
</svg>
  </g>
</svg>